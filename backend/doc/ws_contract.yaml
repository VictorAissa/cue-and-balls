asyncapi: 3.0.0

info:
  title: Billard 2D - WebSocket API
  version: 1.0.0
  description: |
    Real-time game events via Socket.IO.

    ## Authentication
    Pass the JWT access token in the Socket.IO handshake auth payload:
    ```js
    const socket = io('/game', { auth: { token: 'Bearer <accessToken>' } })
    ```
    The server decodes the JWT, retrieves the player's active game from DB,
    and automatically subscribes the socket to the corresponding Socket.IO room.
    No explicit join event is required from the client.

    ## When to connect
    - **Game creator (Player A)**: connect immediately after `POST /games` 200
    - **Joining player (Player B)**: connect immediately after `POST /games/:id/join` 200

    ## Shot protocol
    The physics simulation runs client-side (deterministic).
    1. Shooting player emits `shoot` with angle, power, and cue ball position
    2. Server validates turn ownership, emits `opponent_shot` to the other player
    3. Both clients run the same deterministic simulation from the same parameters
    4. Shooting player emits `shot_resolved` when all balls have stopped
    5. Server validates game rules, persists state, emits `shot_result` to both

    ## Foul handling
    A foul occurs when ball number 0 (cue) appears in `shot_resolved.pocketedNumbers`.
    The server silently resets the cue ball to its spawn position and passes the turn
    to the opponent. No foul field is exposed — the front receives corrected positions
    and the computed next turn player.

servers:
  production:
    host: api.10.108.143.255.nip.io
    protocol: ws
    description: Cluster Minikube — Socket.IO namespace /game

channels:

  game:
    address: /game
    description: |
      Single Socket.IO namespace for all game events.
      Each game uses a Socket.IO room identified by the game ID.
    messages:

      # ── Client -> Server ─────────────────────────────────────────────────

      Shoot:
        $ref: "#/components/messages/Shoot"

      ShotResolved:
        $ref: "#/components/messages/ShotResolved"

      PauseRequest:
        $ref: "#/components/messages/PauseRequest"

      ResumeRequest:
        $ref: "#/components/messages/ResumeRequest"

      LeaveGame:
        $ref: "#/components/messages/LeaveGame"

      # ── Server -> Client ─────────────────────────────────────────────────

      RoomJoined:
        $ref: "#/components/messages/RoomJoined"

      PlayerLeft:
        $ref: "#/components/messages/PlayerLeft"

      GameStarted:
        $ref: "#/components/messages/GameStarted"

      OpponentShot:
        $ref: "#/components/messages/OpponentShot"

      ShotResult:
        $ref: "#/components/messages/ShotResult"

      GamePaused:
        $ref: "#/components/messages/GamePaused"

      GameResumed:
        $ref: "#/components/messages/GameResumed"

      GameOver:
        $ref: "#/components/messages/GameOver"

      WsError:
        $ref: "#/components/messages/WsError"

# Operations are described from the SERVER's perspective:
#   action: receive  → server receives from client
#   action: send     → server sends to client

operations:

  # ── Client -> Server ─────────────────────────────────────────────────────

  shoot:
    action: receive
    summary: Client submits a shot — only accepted when game is ONGOING and it is the sender's turn
    channel:
      $ref: "#/channels/game"
    messages:
      - $ref: "#/channels/game/messages/Shoot"

  shotResolved:
    action: receive
    summary: Shooting player reports final ball state once the simulation ends
    channel:
      $ref: "#/channels/game"
    messages:
      - $ref: "#/channels/game/messages/ShotResolved"

  pauseRequest:
    action: receive
    summary: Request to pause the game — either player can pause
    channel:
      $ref: "#/channels/game"
    messages:
      - $ref: "#/channels/game/messages/PauseRequest"

  resumeRequest:
    action: receive
    summary: Request to resume a paused game — either player can resume
    channel:
      $ref: "#/channels/game"
    messages:
      - $ref: "#/channels/game/messages/ResumeRequest"

  leaveGame:
    action: receive
    summary: Client voluntarily leaves — triggers game_over for the other player
    channel:
      $ref: "#/channels/game"
    messages:
      - $ref: "#/channels/game/messages/LeaveGame"

  # ── Server -> Client ─────────────────────────────────────────────────────

  sendRoomJoined:
    action: send
    summary: Sent to the connecting player with the full current game state
    channel:
      $ref: "#/channels/game"
    messages:
      - $ref: "#/channels/game/messages/RoomJoined"

  sendPlayerLeft:
    action: send
    summary: Broadcast when a player disconnects or emits leave_game
    channel:
      $ref: "#/channels/game"
    messages:
      - $ref: "#/channels/game/messages/PlayerLeft"

  sendGameStarted:
    action: send
    summary: |
      Sent to both players when Player B connects via WebSocket.
      At that point Player A is already connected, so both are in the room.
    channel:
      $ref: "#/channels/game"
    messages:
      - $ref: "#/channels/game/messages/GameStarted"

  sendOpponentShot:
    action: send
    summary: Broadcast shot parameters to the non-shooting player for deterministic local simulation
    channel:
      $ref: "#/channels/game"
    messages:
      - $ref: "#/channels/game/messages/OpponentShot"

  sendShotResult:
    action: send
    summary: Sent to both players with the authoritative result of the shot
    channel:
      $ref: "#/channels/game"
    messages:
      - $ref: "#/channels/game/messages/ShotResult"

  sendGamePaused:
    action: send
    summary: Broadcast when a player pauses the game
    channel:
      $ref: "#/channels/game"
    messages:
      - $ref: "#/channels/game/messages/GamePaused"

  sendGameResumed:
    action: send
    summary: Broadcast when the game resumes after a pause
    channel:
      $ref: "#/channels/game"
    messages:
      - $ref: "#/channels/game/messages/GameResumed"

  sendGameOver:
    action: send
    summary: Sent to both players when the game reaches a terminal state
    channel:
      $ref: "#/channels/game"
    messages:
      - $ref: "#/channels/game/messages/GameOver"

  sendWsError:
    action: send
    summary: Sent to the emitting client when their event is rejected by the server
    channel:
      $ref: "#/channels/game"
    messages:
      - $ref: "#/channels/game/messages/WsError"

# ─── COMPONENTS ──────────────────────────────────────────────────────────────

components:

  messages:

    # ── Client -> Server ───────────────────────────────────────────────────

    Shoot:
      name: shoot
      summary: Submit a shot. Only accepted when game is ONGOING and sender is the current turn player.
      payload:
        type: object
        properties:
          angle:
            type: number
            description: Shot direction in radians
          power:
            type: number
            minimum: 0
            maximum: 1
            description: Shot power, normalized
          cueBallX:
            type: number
            minimum: 0
            maximum: 1
            description: "Cue ball X position at shot time, normalized [0,1]"
          cueBallY:
            type: number
            minimum: 0
            maximum: 1
            description: "Cue ball Y position at shot time, normalized [0,1]"
        required: [angle, power, cueBallX, cueBallY]

    ShotResolved:
      name: shot_resolved
      summary: |
        Sent by the shooting player once all balls have stopped moving.
        Include ball number 0 in pocketedNumbers if the cue ball was pocketed.
        The server detects the foul from this and corrects the cue ball position
        in shot_result without exposing a foul field.
      payload:
        type: object
        properties:
          pocketedNumbers:
            type: array
            items:
              type: integer
              minimum: 0
              maximum: 15
            description: Ball numbers pocketed this shot. Include 0 if cue ball was pocketed.
          finalPositions:
            type: array
            description: Positions of all non-pocketed balls after the shot
            items:
              $ref: "#/components/schemas/BallPosition"
        required: [pocketedNumbers, finalPositions]

    PauseRequest:
      name: pause_request
      summary: Request to pause the game. Either player can pause.
      payload:
        type: object

    ResumeRequest:
      name: resume_request
      summary: Request to resume a paused game. Either player can resume.
      payload:
        type: object

    LeaveGame:
      name: leave_game
      summary: |
        Voluntarily leave the game. Triggers game_over with reason OPPONENT_LEFT
        for the remaining player. Game transitions to ABANDONED.
      payload:
        type: object

    # ── Server -> Client ───────────────────────────────────────────────────

    RoomJoined:
      name: room_joined
      summary: |
        Sent to the connecting player with the full current game state.
        Works for WAITING (Player A waiting for opponent) and ONGOING (normal join or reconnect).
        The client renders the table from this payload before waiting for further events.
      payload:
        type: object
        properties:
          game:
            $ref: "#/components/schemas/Game"
          gamePlayers:
            type: array
            items:
              $ref: "#/components/schemas/GamePlayer"
            maxItems: 2
          gameBalls:
            type: array
            items:
              $ref: "#/components/schemas/GameBall"
            maxItems: 16
        required: [game, gamePlayers, gameBalls]

    PlayerLeft:
      name: player_left
      summary: |
        Broadcast when a player disconnects unexpectedly or emits leave_game.
        If reconnection does not happen within the server TTL, game_over follows.
      payload:
        type: object
        properties:
          playerId:
            type: string
            format: uuid
        required: [playerId]

    GameStarted:
      name: game_started
      summary: |
        Sent to both players when Player B connects via WebSocket (Player A already connected).
        This is the signal to unlock the game UI and begin the first turn.
        Contains both players so each client can identify their opponent.
      payload:
        type: object
        properties:
          firstTurnPlayerId:
            type: string
            format: uuid
          players:
            type: array
            description: Both GamePlayers — each client identifies their opponent from this list
            items:
              $ref: "#/components/schemas/GamePlayer"
            minItems: 2
            maxItems: 2
        required: [firstTurnPlayerId, players]

    OpponentShot:
      name: opponent_shot
      summary: |
        Sent to the non-shooting player with shot parameters.
        The receiving client must run the same deterministic simulation
        from these parameters to produce an identical end state.
      payload:
        type: object
        properties:
          angle:
            type: number
          power:
            type: number
            minimum: 0
            maximum: 1
          cueBallX:
            type: number
            minimum: 0
            maximum: 1
          cueBallY:
            type: number
            minimum: 0
            maximum: 1
        required: [angle, power, cueBallX, cueBallY]

    ShotResult:
      name: shot_result
      summary: |
        Sent to both players after the server processes shot_resolved.
        Single authoritative response covering shot outcome, next turn, and optional type assignment.
        If a foul occurred (cue ball pocketed), the cue ball position in finalPositions
        is silently corrected to the spawn position and the turn passes to the opponent.
      payload:
        type: object
        properties:
          pocketedNumbers:
            type: array
            items:
              type: integer
            description: Authoritative list of balls pocketed this shot
          finalPositions:
            type: array
            description: |
              Authoritative positions of all non-pocketed balls after the shot.
              The cue ball is always included — at spawn position if a foul occurred.
            items:
              $ref: "#/components/schemas/BallPosition"
          nextTurnPlayerId:
            type: string
            format: uuid
            description: |
              Computed by the server. Same player if a legal ball was pocketed,
              opponent otherwise (miss or foul).
          ballTypesAssigned:
            description: |
              Set only on the turn where ball types are first determined
              (first legal non-eight pocketing after the break). Never sent again.
            oneOf:
              - type: object
                properties:
                  solids:
                    type: string
                    format: uuid
                    description: Player ID assigned to solids (balls 1-7)
                  stripes:
                    type: string
                    format: uuid
                    description: Player ID assigned to stripes (balls 9-15)
                required: [solids, stripes]
              - type: "null"
        required: [pocketedNumbers, finalPositions, nextTurnPlayerId]

    GamePaused:
      name: game_paused
      payload:
        type: object
        properties:
          byPlayerId:
            type: string
            format: uuid
        required: [byPlayerId]

    GameResumed:
      name: game_resumed
      payload:
        type: object

    GameOver:
      name: game_over
      payload:
        type: object
        properties:
          winnerId:
            type: string
            format: uuid
          reason:
            type: string
            enum:
              - EIGHT_BALL_POCKETED      # winner pocketed the eight legally
              - FOUL_ON_EIGHT            # player pocketed the eight before clearing their balls
              - OPPONENT_LEFT            # opponent emitted leave_game
              - OPPONENT_DISCONNECTED    # opponent did not reconnect within TTL
        required: [winnerId, reason]

    WsError:
      name: error
      summary: Sent to the emitting client when their event is rejected by the server.
      payload:
        type: object
        properties:
          code:
            type: string
            enum:
              - UNAUTHORIZED
              - GAME_NOT_FOUND
              - NOT_YOUR_TURN
              - GAME_NOT_ONGOING
              - INTERNAL_ERROR
          message:
            type: string
        required: [code, message]

  schemas:

    BallType:
      type: string
      enum: [SOLIDS, STRIPES]
      description: |
        Used only for player assignment. Cue ball (0) and eight ball (8)
        are identified by number, not by this type.

    GameStatus:
      type: string
      enum: [WAITING, ONGOING, PAUSED, FINISHED, ABANDONED]

    Player:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, username, createdAt]

    Game:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/GameStatus"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, status, createdAt, updatedAt]

    GamePlayer:
      type: object
      properties:
        id:
          type: string
          format: uuid
        player:
          $ref: "#/components/schemas/Player"
        ballType:
          description: Null until assigned after the break shot
          oneOf:
            - $ref: "#/components/schemas/BallType"
            - type: "null"
        isTurn:
          type: boolean
      required: [id, player, isTurn]

    Ball:
      type: object
      properties:
        id:
          type: string
          format: uuid
        number:
          type: integer
          minimum: 0
          maximum: 15
          description: "0=cue, 1-7=solids, 8=eight, 9-15=stripes"
        type:
          description: "Null for cue ball (0) and eight ball (8)"
          oneOf:
            - $ref: "#/components/schemas/BallType"
            - type: "null"
        color:
          type: string
          pattern: "^#[0-9A-Fa-f]{6}$"
          description: Hex color defined server-side
      required: [id, number, color]

    GameBall:
      type: object
      properties:
        id:
          type: string
          format: uuid
        ball:
          $ref: "#/components/schemas/Ball"
        x:
          type: number
          minimum: 0
          maximum: 1
          description: "Normalized coordinate [0,1] — to be aligned with frontend"
        y:
          type: number
          minimum: 0
          maximum: 1
          description: "Normalized coordinate [0,1] — to be aligned with frontend"
        isPocketed:
          type: boolean
      required: [id, ball, x, y, isPocketed]

    BallPosition:
      type: object
      description: Lightweight position of a single ball, used in shot messages
      properties:
        number:
          type: integer
          minimum: 0
          maximum: 15
        x:
          type: number
          minimum: 0
          maximum: 1
        y:
          type: number
          minimum: 0
          maximum: 1
      required: [number, x, y]