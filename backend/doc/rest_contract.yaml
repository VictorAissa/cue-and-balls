openapi: 3.1.0

info:
  title: Billard 2D - REST API
  version: 1.0.0

servers:
  - url: http://api.10.108.143.255.nip.io
    description: Cluster Minikube

security:
  - bearerAuth: []

# ─── PATHS ───────────────────────────────────────────────────────────────────

paths:

  # ── Auth ──────────────────────────────────────────────────────────────────

  /auth/register:
    post:
      tags: [Auth]
      summary: Create a player account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  minLength: 3
                  maxLength: 32
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
              required: [username, email, password]
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"
        "409":
          description: Username or email already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: USERNAME_TAKEN
                message: This username is already in use
        "422":
          $ref: "#/components/responses/ValidationError"

  /auth/login:
    post:
      tags: [Auth]
      summary: Authenticate and retrieve JWT tokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
              required: [email, password]
      responses:
        "200":
          description: Authentication successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                required: [accessToken]
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Players ───────────────────────────────────────────────────────────────

  /players/me:
    get:
      tags: [Players]
      summary: Get the authenticated player's profile
      responses:
        "200":
          description: Player profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"
        "401":
          $ref: "#/components/responses/Unauthorized"

    patch:
      tags: [Players]
      summary: Update the authenticated player's profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  minLength: 3
                  maxLength: 32
                avatar:
                  type: string
                  format: uri
                  description: URL to avatar image
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Username already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          $ref: "#/components/responses/ValidationError"

  # ── Games ─────────────────────────────────────────────────────────────────

  /games:
    get:
      tags: [Games]
      summary: List games (lobby)
      description: Returns open games by default. Supports filtering by status.
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GameStatus"
          description: Defaults to WAITING
      responses:
        "200":
          description: List of games with their current players
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GameSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags: [Games]
      summary: Create a new game room
      description: |
        Creates a WAITING game and registers the caller as the first GamePlayer.
        GameBalls are NOT created at this point — they are initialized when the
        second player joins via POST /games/{id}/join.
      responses:
        "201":
          description: Game created — connect to WebSocket immediately with this ID
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                required: [id]
        "400":
          description: Player is already in an active game
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: PLAYER_ALREADY_IN_GAME
                message: You are already participating in an active game
        "401":
          $ref: "#/components/responses/Unauthorized"

  /games/{id}:
    get:
      tags: [Games]
      summary: Get the full state of a game
      description: |
        Returns GameDetail including ball positions and player states.
        Used for reconnection: the client reads this after reconnecting
        before joining the WebSocket room.
      parameters:
        - $ref: "#/components/parameters/GameId"
      responses:
        "200":
          description: Full game state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /games/{id}/join:
    post:
      tags: [Games]
      summary: Join a game as the second player
      description: |
        Registers the caller as the second GamePlayer and transitions the game
        to ONGOING. Initializes the 16 GameBalls with standard rack positions
        (normalized coordinates).
      parameters:
        - $ref: "#/components/parameters/GameId"
      responses:
        "204":
          description: Joined successfully — connect to WebSocket immediately
        "400":
          description: Cannot join this game
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                game_full:
                  value:
                    code: GAME_FULL
                    message: This game already has two players
                game_not_waiting:
                  value:
                    code: GAME_NOT_WAITING
                    message: This game is not open for joining
                player_already_in_game:
                  value:
                    code: PLAYER_ALREADY_IN_GAME
                    message: You are already participating in an active game
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Player is already a participant of this game
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: ALREADY_PARTICIPANT
                message: You are already a participant of this game

# ─── COMPONENTS ──────────────────────────────────────────────────────────────

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    GameId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            code: UNAUTHORIZED
            message: Invalid or expired token

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            code: NOT_FOUND
            message: Game not found

    ValidationError:
      description: Request payload validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            code: VALIDATION_ERROR
            message: password must be at least 8 characters

  schemas:

    # ── Enums ──────────────────────────────────────────────────────────────

    GameStatus:
      type: string
      enum: [WAITING, ONGOING, PAUSED, FINISHED, ABANDONED]

    BallType:
      type: string
      enum: [CUE, SOLIDS, EIGHT, STRIPES]

    # ── Entities ───────────────────────────────────────────────────────────

    Player:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
          format: email
        avatar:
          type:
            - string
            - "null"
          format: uri
        createdAt:
          type: string
          format: date-time
      required: [id, username, email, createdAt]

    Ball:
      type: object
      properties:
        id:
          type: string
          format: uuid
        number:
          type: integer
          minimum: 0
          maximum: 15
          description: "0=cue, 1-7=solids, 8=eight, 9-15=stripes"
        type:
          $ref: "#/components/schemas/BallType"
        color:
          type: string
          pattern: "^#[0-9A-Fa-f]{6}$"
          description: Hex color defined server-side
      required: [id, number, type, color]

    GamePlayer:
      type: object
      properties:
        id:
          type: string
          format: uuid
        player:
          $ref: "#/components/schemas/Player"
        ballType:
          description: Null until assigned after the break shot
          oneOf:
            - $ref: "#/components/schemas/BallType"
            - type: "null"
        isTurn:
          type: boolean
      required: [id, player, isTurn]

    GameBall:
      type: object
      properties:
        id:
          type: string
          format: uuid
        ball:
          $ref: "#/components/schemas/Ball"
        x:
          type: number
          minimum: 0
          maximum: 1
          description: "Normalized coordinate [0,1] — to be aligned with frontend"
        y:
          type: number
          minimum: 0
          maximum: 1
          description: "Normalized coordinate [0,1] — to be aligned with frontend"
        isPocketed:
          type: boolean
      required: [id, ball, x, y, isPocketed]

    Game:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/GameStatus"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, status, createdAt, updatedAt]

    # ── Composite ──────────────────────────────────────────────────────────

    GameSummary:
      description: Lightweight game representation for lobby listing
      type: object
      properties:
        game:
          $ref: "#/components/schemas/Game"
        players:
          type: array
          items:
            $ref: "#/components/schemas/Player"
          maxItems: 2
      required: [game, players]

    GameDetail:
      description: Full game state — used for reconnection and post-join initialization
      type: object
      properties:
        game:
          $ref: "#/components/schemas/Game"
        gamePlayers:
          type: array
          items:
            $ref: "#/components/schemas/GamePlayer"
          maxItems: 2
        gameBalls:
          type: array
          items:
            $ref: "#/components/schemas/GameBall"
          maxItems: 16
      required: [game, gamePlayers, gameBalls]

    # ── Error ──────────────────────────────────────────────────────────────

    Error:
      type: object
      properties:
        code:
          type: string
          enum:
            - UNAUTHORIZED
            - NOT_FOUND
            - VALIDATION_ERROR
            - USERNAME_TAKEN
            - EMAIL_TAKEN
            - PLAYER_ALREADY_IN_GAME
            - ALREADY_PARTICIPANT
            - GAME_FULL
            - GAME_NOT_WAITING
        message:
          type: string
      required: [code, message]