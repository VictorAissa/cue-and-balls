<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cue & Balls — WS Test Client</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: monospace; background: #1a1a1a; color: #e0e0e0; display: flex; flex-direction: column; height: 100vh; }

        header { background: #111; padding: 10px 16px; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 12px; }
        header h1 { font-size: 14px; color: #aaa; font-weight: normal; }
        #status-dot { width: 10px; height: 10px; border-radius: 50%; background: #555; flex-shrink: 0; }
        #status-dot.connected { background: #4caf50; }
        #status-dot.error { background: #f44336; }
        #status-label { font-size: 12px; color: #777; }

        .main { display: flex; flex: 1; overflow: hidden; }

        .panel { display: flex; flex-direction: column; flex: 1; border-right: 1px solid #2a2a2a; }
        .panel:last-child { border-right: none; }

        .panel-header { background: #222; padding: 8px 12px; font-size: 11px; color: #888; border-bottom: 1px solid #2a2a2a; display: flex; align-items: center; justify-content: space-between; }
        .panel-header span { color: #ccc; font-weight: bold; }

        .config { padding: 10px 12px; border-bottom: 1px solid #2a2a2a; display: flex; flex-direction: column; gap: 6px; }
        .config input { background: #2a2a2a; border: 1px solid #3a3a3a; color: #e0e0e0; padding: 5px 8px; font-family: monospace; font-size: 12px; border-radius: 3px; width: 100%; }
        .config input:focus { outline: none; border-color: #555; }

        .btn-row { display: flex; gap: 6px; padding: 8px 12px; border-bottom: 1px solid #2a2a2a; flex-wrap: wrap; }
        button { background: #2a2a2a; border: 1px solid #3a3a3a; color: #ccc; padding: 5px 10px; font-family: monospace; font-size: 11px; cursor: pointer; border-radius: 3px; }
        button:hover { background: #333; border-color: #555; }
        button.primary { background: #1a3a1a; border-color: #2d5a2d; color: #7ec87e; }
        button.primary:hover { background: #1f4a1f; }
        button.danger { background: #3a1a1a; border-color: #5a2d2d; color: #c87e7e; }
        button.danger:hover { background: #4a1f1f; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }

        .log { flex: 1; overflow-y: auto; padding: 8px 12px; font-size: 11px; line-height: 1.6; }
        .log-entry { padding: 2px 0; border-bottom: 1px solid #222; word-break: break-all; }
        .log-entry.recv { color: #7ec87e; }
        .log-entry.send { color: #7eaec8; }
        .log-entry.info { color: #aaa; }
        .log-entry.err  { color: #f44336; }
        .ts { color: #555; margin-right: 6px; }
        .tag { margin-right: 6px; padding: 1px 4px; border-radius: 2px; font-size: 10px; }
        .tag.recv { background: #1a3a1a; color: #7ec87e; }
        .tag.send { background: #1a2a3a; color: #7eaec8; }
        .tag.info { background: #2a2a2a; color: #aaa; }
        .tag.err  { background: #3a1a1a; color: #f44336; }

        .send-area { padding: 8px 12px; border-top: 1px solid #2a2a2a; display: flex; flex-direction: column; gap: 6px; }
        .send-row { display: flex; gap: 6px; }
        .send-row input { flex: 1; background: #2a2a2a; border: 1px solid #3a3a3a; color: #e0e0e0; padding: 5px 8px; font-family: monospace; font-size: 12px; border-radius: 3px; }
        .send-row input:focus { outline: none; border-color: #555; }
        textarea.payload { background: #2a2a2a; border: 1px solid #3a3a3a; color: #e0e0e0; padding: 5px 8px; font-family: monospace; font-size: 11px; border-radius: 3px; resize: vertical; min-height: 60px; width: 100%; }
        textarea.payload:focus { outline: none; border-color: #555; }

        .presets { padding: 6px 12px; border-top: 1px solid #2a2a2a; display: flex; gap: 5px; flex-wrap: wrap; }
        .presets label { font-size: 10px; color: #666; align-self: center; }
        .preset-btn { font-size: 10px; padding: 3px 7px; background: #252525; }
    </style>
</head>
<body>

<header>
    <div id="status-dot"></div>
    <h1>Cue &amp; Balls — WS Test Client</h1>
    <span id="status-label">disconnected</span>
</header>

<div class="main">

    <!-- PLAYER A -->
    <div class="panel" id="panel-a">
        <div class="panel-header">
            <span>Player A</span>
            <span id="label-a" style="color:#555">—</span>
        </div>

        <div class="config">
            <input id="url-a" placeholder="WS URL  ex: http://localhost:3001" value="http://localhost:3001">
            <input id="token-a" placeholder="Bearer token (sans 'Bearer ')">
        </div>

        <div class="btn-row">
            <button class="primary" onclick="connect('a')">Connect</button>
            <button class="danger" onclick="disconnect('a')">Disconnect</button>
            <button onclick="clearLog('a')">Clear</button>
        </div>

        <div class="log" id="log-a"></div>

        <div class="presets">
            <label>Presets:</label>
            <button class="preset-btn" onclick="preset('a','shoot')">shoot</button>
            <button class="preset-btn" onclick="preset('a','shot_resolved_miss')">shot_resolved (miss)</button>
            <button class="preset-btn" onclick="preset('a','shot_resolved_pocket')">shot_resolved (pocket)</button>
            <button class="preset-btn" onclick="preset('a','pause_request')">pause</button>
            <button class="preset-btn" onclick="preset('a','resume_request')">resume</button>
            <button class="preset-btn" onclick="preset('a','leave_game')">leave</button>
        </div>

        <div class="send-area">
            <div class="send-row">
                <input id="event-a" placeholder="event name" value="shoot">
                <button onclick="sendEvent('a')">Send</button>
            </div>
            <textarea class="payload" id="payload-a">{"angle":1.5,"power":0.8,"cueBallX":0.25,"cueBallY":0.5}</textarea>
        </div>
    </div>

    <!-- PLAYER B -->
    <div class="panel" id="panel-b">
        <div class="panel-header">
            <span>Player B</span>
            <span id="label-b" style="color:#555">—</span>
        </div>

        <div class="config">
            <input id="url-b" placeholder="WS URL  ex: http://localhost:3002" value="http://localhost:3002">
            <input id="token-b" placeholder="Bearer token (sans 'Bearer ')">
        </div>

        <div class="btn-row">
            <button class="primary" onclick="connect('b')">Connect</button>
            <button class="danger" onclick="disconnect('b')">Disconnect</button>
            <button onclick="clearLog('b')">Clear</button>
        </div>

        <div class="log" id="log-b"></div>

        <div class="presets">
            <label>Presets:</label>
            <button class="preset-btn" onclick="preset('b','shoot')">shoot</button>
            <button class="preset-btn" onclick="preset('b','shot_resolved_miss')">shot_resolved (miss)</button>
            <button class="preset-btn" onclick="preset('b','shot_resolved_pocket')">shot_resolved (pocket)</button>
            <button class="preset-btn" onclick="preset('b','pause_request')">pause</button>
            <button class="preset-btn" onclick="preset('b','resume_request')">resume</button>
            <button class="preset-btn" onclick="preset('b','leave_game')">leave</button>
        </div>

        <div class="send-area">
            <div class="send-row">
                <input id="event-b" placeholder="event name" value="shoot">
                <button onclick="sendEvent('b')">Send</button>
            </div>
            <textarea class="payload" id="payload-b">{"angle":1.5,"power":0.8,"cueBallX":0.25,"cueBallY":0.5}</textarea>
        </div>
    </div>

</div>

<script>
    const sockets = { a: null, b: null };

    const PRESETS = {
        shoot: {
            event: 'shoot',
            payload: { angle: 1.5, power: 0.8, cueBallX: 0.25, cueBallY: 0.5 }
        },
        shot_resolved_miss: {
            event: 'shot_resolved',
            payload: { pocketedNumbers: [], finalPositions: [{ number: 0, x: 0.25, y: 0.5 }] }
        },
        shot_resolved_pocket: {
            event: 'shot_resolved',
            payload: { pocketedNumbers: [3], finalPositions: [{ number: 0, x: 0.25, y: 0.5 }, { number: 3, x: 0.1, y: 0.1 }] }
        },
        pause_request: { event: 'pause_request', payload: {} },
        resume_request: { event: 'resume_request', payload: {} },
        leave_game: { event: 'leave_game', payload: {} },
    };

    const EVENTS_TO_LISTEN = [
        'room_joined', 'game_started', 'opponent_shot',
        'shot_result', 'game_paused', 'game_resumed',
        'game_over', 'player_left', 'error'
    ];

    function ts() {
        return new Date().toISOString().slice(11, 23);
    }

    function log(player, type, tag, msg) {
        const el = document.getElementById('log-' + player);
        const entry = document.createElement('div');
        entry.className = 'log-entry ' + type;
        entry.innerHTML = `<span class="ts">${ts()}</span><span class="tag ${type}">${tag}</span>${escapeHtml(msg)}`;
        el.appendChild(entry);
        el.scrollTop = el.scrollHeight;
    }

    function escapeHtml(str) {
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;');
    }

    function clearLog(player) {
        document.getElementById('log-' + player).innerHTML = '';
    }

    function setStatus(player, connected) {
        const dot = document.getElementById('status-dot');
        const label = document.getElementById('status-label');
        // update per-panel label
        const panelLabel = document.getElementById('label-' + player);
        panelLabel.textContent = connected ? 'connected' : 'disconnected';
        panelLabel.style.color = connected ? '#4caf50' : '#555';
        // global dot reflects any connection
        const anyConnected = Object.values(sockets).some(s => s && s.connected);
        dot.className = anyConnected ? 'connected' : '';
        label.textContent = anyConnected ? 'connected' : 'disconnected';
    }

    function connect(player) {
        const url = document.getElementById('url-' + player).value.trim();
        const token = document.getElementById('token-' + player).value.trim();

        if (!url) { log(player, 'err', 'ERR', 'URL is required'); return; }
        if (!token) { log(player, 'err', 'ERR', 'Token is required'); return; }
        if (sockets[player]) { disconnect(player); }

        log(player, 'info', 'INFO', `Connecting to ${url}/game ...`);

        const socket = io(url + '/game', {
            auth: { token: 'Bearer ' + token },
            transports: ['websocket'],
            reconnection: true,
            reconnectionAttempts: 5,
            reconnectionDelay: 1000,
        });

        sockets[player] = socket;

        socket.on('connect', () => {
            log(player, 'info', 'INFO', `Connected — socket.id: ${socket.id}`);
            setStatus(player, true);
        });

        socket.on('connect_error', (err) => {
            log(player, 'err', 'ERR', `connect_error: ${err.message}`);
            setStatus(player, false);
        });

        socket.on('disconnect', (reason) => {
            log(player, 'info', 'INFO', `Disconnected: ${reason}`);
            setStatus(player, false);
        });

        EVENTS_TO_LISTEN.forEach(event => {
            socket.on(event, (data) => {
                log(player, 'recv', event, JSON.stringify(data, null, 0));
            });
        });
    }

    function disconnect(player) {
        if (sockets[player]) {
            sockets[player].disconnect();
            sockets[player] = null;
        }
        setStatus(player, false);
    }

    function sendEvent(player) {
        const socket = sockets[player];
        if (!socket || !socket.connected) {
            log(player, 'err', 'ERR', 'Not connected');
            return;
        }

        const event = document.getElementById('event-' + player).value.trim();
        const rawPayload = document.getElementById('payload-' + player).value.trim();

        if (!event) { log(player, 'err', 'ERR', 'Event name is required'); return; }

        let payload = {};
        if (rawPayload) {
            try { payload = JSON.parse(rawPayload); }
            catch (e) { log(player, 'err', 'ERR', 'Invalid JSON: ' + e.message); return; }
        }

        socket.emit(event, payload);
        log(player, 'send', event, JSON.stringify(payload, null, 0));
    }

    function preset(player, name) {
        const p = PRESETS[name];
        if (!p) return;
        document.getElementById('event-' + player).value = p.event;
        document.getElementById('payload-' + player).value = JSON.stringify(p.payload, null, 2);
    }

    // send on Enter in event input
    ['a', 'b'].forEach(player => {
        document.getElementById('event-' + player).addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendEvent(player);
        });
    });
</script>
</body>
</html>
