apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: pool
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      automountServiceAccountToken: false
      initContainers:
        - name: db-init
          image: pool-backend:1.0.0
          imagePullPolicy: Never
          command:
            - sh
            - -c
            - "npx prisma migrate deploy && npx prisma db seed"
          envFrom:
            - secretRef:
                name: backend-secret
      containers:
        - name: backend
          image: pool-backend:1.0.0
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
          envFrom:
            - secretRef:
                name: backend-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
              ephemeral-storage: 128Mi
            limits:
              memory: 256Mi
              ephemeral-storage: 256Mi