apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: pool
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      automountServiceAccountToken: false
      #imagePullSecrets:
        #- name: ghcr-pull
      initContainers:
        - name: db-init
          image: ${BACKEND_IMAGE}
          imagePullPolicy: ${IMAGE_PULL_POLICY}
          command:
            - sh
            - -c
            - "npx prisma migrate deploy && node dist/src/seed.js"
          envFrom:
            - secretRef:
                name: backend-secret
      containers:
        - name: backend
          image: ${BACKEND_IMAGE}
          imagePullPolicy: ${IMAGE_PULL_POLICY}
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
          envFrom:
            - secretRef:
                name: backend-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
              ephemeral-storage: 128Mi
            limits:
              memory: 256Mi
              ephemeral-storage: 256Mi