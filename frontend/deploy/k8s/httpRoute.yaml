apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend-route
  namespace: pool
spec:
  parentRefs:
    - name: pool-gateway
  hostnames:
    - "web.xxx.xxx.xxx.xxx.nip.io" # get EXTERNAL-IP from traefik url attribution in cluster
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          port: 80