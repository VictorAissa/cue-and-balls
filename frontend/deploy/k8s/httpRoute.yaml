apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend-route
  namespace: pool
spec:
  parentRefs:
    - name: pool-gateway
  hostnames:
    # GATEWAY_IP is substituted at deploy time, see cluster/env.azure or cluster/env.local
    - "web.${GATEWAY_IP}.nip.io"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          port: 80